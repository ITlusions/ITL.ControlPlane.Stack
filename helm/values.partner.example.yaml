# ════════════════════════════════════════════════════════════════════════════
#  ITL ControlPlane Helm Chart — Partner Override Template
#
#  Copy this file to values.partner.yaml (generated by install script),
#  fill in your values, and run:
#    helm upgrade --install itl-controlplane ./helm \
#      -f helm/values.yaml \
#      -f values.partner.yaml \
#      --namespace itl-platform --create-namespace
# ════════════════════════════════════════════════════════════════════════════

partner:
  name: "CHANGE_ME_PARTNER_NAME"
  domain: "platform.yourdomain.com"
  adminEmail: "admin@yourdomain.com"

# Keycloak
keycloak:
  adminPassword: "CHANGE_ME_BEFORE_PRODUCTION"
  clientSecret: "RUN_INSTALL_SCRIPT_TO_GENERATE"

# Databases
postgresql:
  auth:
    password: "CHANGE_ME_BEFORE_PRODUCTION"

neo4j:
  auth:
    password: "CHANGE_ME_BEFORE_PRODUCTION"

redis:
  auth:
    password: "CHANGE_ME_BEFORE_PRODUCTION"

rabbitmq:
  auth:
    password: "CHANGE_ME_BEFORE_PRODUCTION"

# Internal JWT signing key
global:
  jwtSecret: "CHANGE_ME_BEFORE_PRODUCTION"

# Optional: custom image registry (if you mirror images internally)
# global:
#   imageRegistry: registry.yourdomain.com

# Optional: HA scaling for production
# apiGateway:
#   replicaCount: 3
# coreProvider:
#   replicaCount: 3

# Optional: use your own storage class
# global:
#   storageClass: "your-storage-class"

# Optional: disable TLS for local/air-gapped installs
# ingress:
#   tls: false
#   annotations: {}
