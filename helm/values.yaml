# ════════════════════════════════════════════════════════════════════════════
#  ITL ControlPlane Helm Chart — Default Values
#  Override per partner via values.partner.yaml (generated by install script)
# ════════════════════════════════════════════════════════════════════════════

# ── Partner metadata ──────────────────────────────────────────────────────────
partner:
  name: "ITL Partner"
  domain: "platform.local"
  adminEmail: "admin@platform.local"

# ── Global ────────────────────────────────────────────────────────────────────
global:
  imageRegistry: ""          # override to use private registry: ghcr.io/itlusions
  imagePullSecrets: []
  jwtSecret: ""              # populated by install script

  # Storage class — leave empty to use cluster default
  storageClass: ""

# ── Image defaults ────────────────────────────────────────────────────────────
image:
  registry: ghcr.io
  org: itlusions
  tag: "latest"
  pullPolicy: IfNotPresent

# ── API Gateway ───────────────────────────────────────────────────────────────
apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/itlusions/itl-controlplane-api
    tag: ""    # defaults to .Values.image.tag
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    LOG_LEVEL: INFO
    GRAPH_DB_ENABLED: "true"
    GRAPH_DB_TYPE: neo4j
  ingress:
    host: ""   # defaults to api.<partner.domain>

# ── Core Provider ─────────────────────────────────────────────────────────────
coreProvider:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/itlusions/itl-core-provider
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    LOG_LEVEL: INFO
    STORAGE_BACKEND: postgresql
    AUDIT_RABBITMQ_ENABLED: "true"

# ── Identity Provider ─────────────────────────────────────────────────────────
identityProvider:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/itlusions/itl-identity-provider
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    LOG_LEVEL: INFO
    IDENTITY_PROVIDER: keycloak
    GATEWAY_REGISTRATION_ENABLED: "true"

# ── IAM Provider ──────────────────────────────────────────────────────────────
iamProvider:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/itlusions/itl-iam-provider
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Portal / Dashboard / Admin ────────────────────────────────────────────────
portal:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/itlusions/itl-controlplane-portal
    tag: ""
  service:
    type: ClusterIP
    port: 8090
  ingress:
    host: ""   # defaults to <partner.domain>

dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/itlusions/itl-controlplane-dashboard
    tag: ""
  service:
    type: ClusterIP
    port: 8090
  ingress:
    host: ""   # defaults to dashboard.<partner.domain>

admin:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/itlusions/itl-controlplane-admin
    tag: ""
  service:
    type: ClusterIP
    port: 8090
  ingress:
    host: ""   # defaults to admin.<partner.domain>

# ── Infrastructure dependencies ───────────────────────────────────────────────

postgresql:
  enabled: true
  auth:
    database: controlplane
    username: controlplane
    password: ""   # populated by install script
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 1Gi  }
  # Extra database for Keycloak
  initdbScripts:
    init-keycloak-db.sql: |
      CREATE DATABASE keycloak;
      GRANT ALL PRIVILEGES ON DATABASE keycloak TO controlplane;

neo4j:
  enabled: true
  neo4j:
    name: itl-neo4j
    password: ""   # populated by install script
    edition: community
  volumes:
    data:
      mode: defaultStorageClass
      requests:
        storage: 10Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi  }

redis:
  enabled: true
  auth:
    enabled: true
    password: ""   # populated by install script
  master:
    persistence:
      enabled: true
      size: 2Gi
  replica:
    replicaCount: 0   # single-node for partner installs; increase for HA

rabbitmq:
  enabled: true
  auth:
    username: itl
    password: ""   # populated by install script
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: ""  # populated by install script
  postgresql:
    enabled: false   # uses shared PostgreSQL
  externalDatabase:
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    user: controlplane
    database: keycloak
    existingSecret: itl-controlplane-secrets
    existingSecretPasswordKey: POSTGRES_PASSWORD
  service:
    type: ClusterIP
    ports:
      http: 8080
  ingress:
    enabled: true
    hostname: ""   # defaults to iam.<partner.domain>
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 2Gi  }

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: true   # set false for local/self-signed

# ── cert-manager ──────────────────────────────────────────────────────────────
certManager:
  email: ""   # populated from partner.adminEmail

# ── Keycloak post-install job ─────────────────────────────────────────────────
keycloakSetup:
  enabled: true
  realmName: "itl-platform"
  clientId: "itl-identity-service"

# ── Pod defaults ──────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

serviceAccount:
  create: true
  name: ""

# ── Monitoring (optional) ─────────────────────────────────────────────────────
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: monitoring
