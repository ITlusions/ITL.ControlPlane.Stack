apiVersion: v2
name: itl-controlplane
description: ITL ControlPlane — Full partner stack (API gateway, resource providers, IAM, databases)
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - controlplane
  - itl
  - resource-management
  - iam
  - keycloak
home: https://github.com/ITlusions/ITL.ControlPanel.Stack
sources:
  - https://github.com/ITlusions/ITL.ControlPanel.Stack
maintainers:
  - name: ITL Platform Team
    email: platform@itlusions.com

# Bitnami subcharts for infrastructure components
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: rabbitmq
    version: "14.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled

  - name: neo4j
    version: "5.x.x"
    repository: https://helm.neo4j.com/neo4j
    condition: neo4j.enabled

  - name: keycloak
    version: "21.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
