{{- if .Values.coreProvider.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-core-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: core-provider
spec:
  replicas: {{ .Values.coreProvider.replicaCount }}
  selector:
    matchLabels:
      {{- include "itl-controlplane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core-provider
  template:
    metadata:
      labels:
        {{- include "itl-controlplane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core-provider
    spec:
      serviceAccountName: {{ include "itl-controlplane.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: core-provider
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ .Values.coreProvider.image.repository }}:{{ .Values.coreProvider.image.tag | default .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.coreProvider.service.port }}
          env:
            - name: DATABASE_URL
              value: {{ include "itl-controlplane.postgresUrl" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_URI
              value: {{ include "itl-controlplane.neo4jUrl" . }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: NEO4J_PASSWORD
            - name: AMQP_URL
              value: {{ include "itl-controlplane.rabbitmqUrl" . }}
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: RABBITMQ_PASSWORD
            - name: LOG_LEVEL
              value: {{ .Values.coreProvider.env.LOG_LEVEL | quote }}
            - name: STORAGE_BACKEND
              value: {{ .Values.coreProvider.env.STORAGE_BACKEND | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.coreProvider.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-core-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: core-provider
spec:
  type: {{ .Values.coreProvider.service.type }}
  ports:
    - port: {{ .Values.coreProvider.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "itl-controlplane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: core-provider
{{- end }}
