{{- if .Values.identityProvider.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-identity-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity-provider
spec:
  replicas: {{ .Values.identityProvider.replicaCount }}
  selector:
    matchLabels:
      {{- include "itl-controlplane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: identity-provider
  template:
    metadata:
      labels:
        {{- include "itl-controlplane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: identity-provider
    spec:
      serviceAccountName: {{ include "itl-controlplane.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: identity-provider
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ .Values.identityProvider.image.repository }}:{{ .Values.identityProvider.image.tag | default .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.identityProvider.service.port }}
          env:
            - name: KEYCLOAK_URL
              value: {{ include "itl-controlplane.keycloakUrl" . }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloakSetup.realmName | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloakSetup.clientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: JWT_SECRET
            - name: LOG_LEVEL
              value: {{ .Values.identityProvider.env.LOG_LEVEL | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.identityProvider.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-identity-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity-provider
spec:
  type: {{ .Values.identityProvider.service.type }}
  ports:
    - port: {{ .Values.identityProvider.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "itl-controlplane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: identity-provider
{{- end }}
