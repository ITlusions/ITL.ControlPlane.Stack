{{/*
  Central secrets for all ITL ControlPlane services.
  Sourced from values (which are written by the install wizard).
  In production, use External Secrets Operator or Vault instead.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: itl-controlplane-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  POSTGRES_PASSWORD:        {{ .Values.postgresql.auth.password | required "postgresql.auth.password is required" | quote }}
  NEO4J_PASSWORD:           {{ .Values.neo4j.auth.password      | required "neo4j.auth.password is required"      | quote }}
  REDIS_PASSWORD:           {{ .Values.redis.auth.password      | required "redis.auth.password is required"      | quote }}
  RABBITMQ_PASSWORD:        {{ .Values.rabbitmq.auth.password   | required "rabbitmq.auth.password is required"   | quote }}
  KEYCLOAK_ADMIN_PASSWORD:  {{ .Values.keycloak.auth.adminPassword | required "keycloak.auth.adminPassword is required" | quote }}
  KEYCLOAK_CLIENT_SECRET:   {{ .Values.keycloak.clientSecret    | default ""  | quote }}
  JWT_SECRET:               {{ .Values.global.jwtSecret         | required "global.jwtSecret is required"         | quote }}
