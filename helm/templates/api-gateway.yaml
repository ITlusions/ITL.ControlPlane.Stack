{{- if .Values.apiGateway.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "itl-controlplane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        {{- include "itl-controlplane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: {{ include "itl-controlplane.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api-gateway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag | default .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.service.port }}
          env:
            - name: DATABASE_URL
              value: {{ include "itl-controlplane.postgresUrl" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_URI
              value: {{ include "itl-controlplane.neo4jUrl" . }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_URL
              value: {{ include "itl-controlplane.redisUrl" . }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: itl-controlplane-secrets
                  key: JWT_SECRET
            - name: KEYCLOAK_URL
              value: {{ include "itl-controlplane.keycloakUrl" . }}
            - name: LOG_LEVEL
              value: {{ .Values.apiGateway.env.LOG_LEVEL | quote }}
            - name: GRAPH_DB_ENABLED
              value: {{ .Values.apiGateway.env.GRAPH_DB_ENABLED | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "itl-controlplane.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itl-controlplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "itl-controlplane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
{{- end }}
